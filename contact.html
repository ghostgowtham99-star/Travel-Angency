<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="nav">
            <h1>📍Travel Agency</h1>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="Destination.html">Destinations</a></li>
                    <li><a href="package.html">Package</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
               
        </div>
        <section class="contact">
            <div >
                <h2>Contact us</h2>
                <p>We would love to hear from you!</p>
            </div>
        </section>
        <section class="contact-info">
            <h1>Get in Touch</h1>
            <div class="grid1">
                <div class="form-container">
                        <h3>Send us a Message</h3>
                        <label for="name">Name:</label><br>
                        <input type="text" id="name" required placeholder="Enter your name"><br>
                        <label for="email">Email:</label>
                        <input type="email" id="email" required placeholder="Travelagency@gmail.com"><br>
                        <label for="phone">Phone:</label>
                        <input type="tel" id="phone" required placeholder="+1234567890"><br>
                        <label for="message">Message:</label><br>
                        <textarea id="message" required placeholder="Enter your message"></textarea><br>
                        <button type="submit">Send Message</button>
                    
                </div>

                <div class="info">
                    <h3>Our Location</h3>
                    <p> Here Mappae</p>
                    <p>📞 +91 23-456-7890</p>
                    <p>✉ info@travelagency.com</p>
                    <h4>Follow Us</h4>
                    <div class="social">
                    <span>🌐</span>
                    <span>📘</span>
                    <span>🐦</span>
                    <span>📷</span>
                    </div class="map">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d387190.2799148788!2d-74.2598736877699!3d40.69767006376944!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c250b9e5b8a7b%3A0x7a6c8e5b8a7b!2sNew%20York%2C%20USA!5e0!3m2!1sen!2s!4v1600000000000!5m2!1sen!2s" width="600" height="450" style="border:0;" allowfullscreen="" aria-hidden="false" tabindex="0"></iframe>
                </div>
            </div>
        </section>
        <button class="contbtn"><a href="index.html">Back to Home</a></button>
    
</body>
</html>
